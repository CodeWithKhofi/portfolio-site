<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseFlow Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="expense.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="saas-tool">
            <header>
                <div class="brand">
                    <div class="logo-icon"></div>
                    <h2>Expense Flow <span class="pro-tag">PRO</span></h2>
                </div>
                <div id="total-badge">$0.00</div>
            </header>

            <div class="input-section">
                <div class="field">
                    <label>Description</label>
                    <input type="text" id="itemName" placeholder="Netflix, Rent...">
                </div>
                <div class="field">
                    <label>Amount</label>
                    <input type="number" id="itemAmount" placeholder="0.00">
                </div>
                <div class="field">
                    <label>Category</label>
                    <select id="itemCategory">
                        <option value="Subscription">Subscription</option>
                        <option value="Food">Food</option>
                        <option value="Utility">Utility</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                </div>
                <button id="addBtn">Add Entry</button>
            </div>

            <div class="data-display">
                <table id="expenseTable">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="expense.js"></script>
</body>
</html>
